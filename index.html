<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Movie Night</title>
	<style>
		:root {
			--page-bg: #edf3f8;
			--page-bg-soft: #e4edf5;
			--panel-bg: rgba(255, 255, 255, 0.72);
			--card-bg: rgba(255, 255, 255, 0.88);
			--card-border: rgba(12, 25, 44, 0.08);
			--muted: #7486a1;
			--text: #132033;
			--accent: #0ed1aa;
			--accent-soft: rgba(14, 209, 170, 0.12);
			--accent-strong: #13f0c2;
			--shadow: 0 18px 40px rgba(20, 39, 68, 0.08);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background:
				radial-gradient(circle at 15% 15%, rgba(14, 209, 170, 0.08), transparent 22%),
				radial-gradient(circle at 85% 10%, rgba(21, 64, 122, 0.08), transparent 26%),
				linear-gradient(180deg, var(--page-bg) 0%, var(--page-bg-soft) 100%);
			color: var(--text);
			font-family: "SF Pro Display", "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
		}

		.shell {
			max-width: 1180px;
			margin: 0 auto;
			padding: 20px 16px 44px;
		}

		.topbar {
			position: sticky;
			top: 0;
			z-index: 10;
			backdrop-filter: blur(18px);
			background: #09182b;
			border-bottom: 1px solid rgba(255, 255, 255, 0.08);
		}

		.topbar-inner {
			max-width: 1100px;
			margin: 0 auto;
			padding: 14px 16px 12px;
		}

		.topbar.is-collapsed .topbar-inner {
			padding-bottom: 10px;
		}

		.heading {
			display: flex;
			align-items: end;
			justify-content: space-between;
			gap: 16px;
			margin-bottom: 12px;
		}

		.topbar.is-collapsed .heading {
			margin-bottom: 0;
		}

		.heading h1 {
			margin: 0;
			font-size: clamp(1.8rem, 3.5vw, 2.8rem);
			font-weight: 700;
			line-height: 0.95;
			letter-spacing: -0.05em;
		}

		.heading h1,
		.heading p,
		.status {
			margin: 0;
			color: #ffffff;
			font-size: 0.84rem;
		}

		.header-main {
			min-width: 0;
		}

		.header-summary {
			display: none;
			margin-top: 4px;
			font-size: 0.84rem;
			color: rgba(255, 255, 255, 0.88);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.header-actions {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.header-toggle {
			border: 1px solid rgba(255, 255, 255, 0.12);
			background: rgba(255, 255, 255, 0.08);
			color: #ffffff;
			border-radius: 999px;
			padding: 7px 12px;
			font-size: 0.75rem;
			line-height: 1;
			cursor: pointer;
		}

		.header-toggle:hover,
		.header-toggle:focus-visible {
			border-color: rgba(14, 209, 170, 0.5);
			outline: none;
		}

		.search-wrap {
			position: relative;
		}

		.topbar-panel {
			display: block;
		}

		.topbar.is-collapsed .topbar-panel {
			display: none;
		}

		.topbar.is-collapsed .heading p {
			display: none;
		}

		.topbar.is-collapsed .header-summary {
			display: block;
		}

		.filters {
			display: grid;
			gap: 10px;
			margin-top: 12px;
		}

		.filter-row {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			align-items: center;
		}

		.filter-label {
			font-size: 0.72rem;
			font-weight: 700;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.72);
			margin-right: 2px;
		}

		.chip {
			border: 1px solid rgba(255, 255, 255, 0.12);
			background: rgba(255, 255, 255, 0.08);
			color: #ffffff;
			border-radius: 999px;
			padding: 7px 11px;
			font-size: 0.76rem;
			line-height: 1;
			cursor: pointer;
			transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
		}

		.chip.is-active {
			background: rgba(14, 209, 170, 0.18);
			border-color: rgba(14, 209, 170, 0.5);
			color: #dffff8;
		}

		.search {
			width: 100%;
			border: 1px solid rgba(12, 25, 44, 0.08);
			border-radius: 18px;
			padding: 14px 16px;
			background: rgba(255, 255, 255, 0.92);
			color: var(--text);
			font-size: 0.92rem;
			box-shadow:
				inset 0 1px 0 rgba(255, 255, 255, 0.4),
				0 10px 24px rgba(20, 39, 68, 0.05);
		}

		.search::placeholder {
			color: #8fa0b7;
		}

		.search:focus {
			outline: 2px solid rgba(14, 209, 170, 0.16);
			border-color: rgba(14, 209, 170, 0.5);
		}

		.grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 16px;
			padding-top: 8px;
		}

		.card {
			display: grid;
			grid-template-columns: 132px minmax(0, 1fr);
			gap: 14px;
			padding: 12px;
			border: 1px solid var(--card-border);
			border-radius: 12px;
			background: var(--card-bg);
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
			backdrop-filter: blur(10px);
		}

		.card::before {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(135deg, rgba(14, 209, 170, 0.04), transparent 35%, transparent 70%, rgba(21, 64, 122, 0.04));
			pointer-events: none;
		}

		.poster {
			width: 100%;
			height: 100%;
			min-height: 248px;
			border-radius: 10px;
			overflow: hidden;
			background: linear-gradient(180deg, rgba(220, 231, 240, 0.9) 0%, rgba(197, 211, 224, 0.95) 100%);
			border: 1px solid rgba(12, 25, 44, 0.06);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
		}

		.poster img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.poster-fallback {
			width: 100%;
			height: 100%;
			display: grid;
			place-items: center;
			padding: 12px;
			text-align: center;
			font-weight: 700;
			font-size: 0.86rem;
			line-height: 1.1;
			color: rgba(19, 32, 51, 0.62);
		}

		.content {
			min-width: 0;
			display: flex;
			flex-direction: column;
			position: relative;
			z-index: 1;
		}

		.title-row {
			display: flex;
			align-items: baseline;
			gap: 6px;
			flex-wrap: wrap;
		}

		.title {
			margin: 0;
			font-size: clamp(1.08rem, 2.4vw, 1.36rem);
			line-height: 1.05;
			letter-spacing: -0.04em;
		}

		.year {
			font-size: 0.88rem;
			font-weight: 600;
			color: var(--muted);
		}

		.meta-line {
			margin-top: 4px;
			color: var(--muted);
			font-size: 0.82rem;
			line-height: 1.3;
		}

		.scoreboard {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 10px;
			margin-top: 14px;
		}

		.score-block {
			background: linear-gradient(180deg, rgba(14, 209, 170, 0.05), rgba(255, 255, 255, 0.75));
			border: 1px solid rgba(12, 25, 44, 0.05);
			border-radius: 8px;
			padding: 10px 12px;
			min-height: 68px;
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
		}

		.score-label {
			display: block;
			font-size: 0.65rem;
			font-weight: 700;
			letter-spacing: 0.14em;
			text-transform: uppercase;
			color: var(--accent);
		}

		.score-value {
			display: block;
			margin-top: 4px;
			font-size: clamp(1.4rem, 4vw, 2rem);
			line-height: 1;
			font-weight: 700;
			letter-spacing: -0.04em;
		}

		.synopsis {
			width: 100%;
			text-align: left;
			margin-top: 10px;
			color: #4f607a;
			font-size: 0.8rem;
			line-height: 1.42;
			display: -webkit-box;
			-webkit-line-clamp: 3;
			-webkit-box-orient: vertical;
			overflow: hidden;
			cursor: pointer;
			user-select: none;
		}

		.synopsis.is-expanded {
			display: block;
			-webkit-line-clamp: unset;
			overflow: visible;
		}

		.links {
			margin-top: auto;
			display: flex;
			justify-content: flex-end;
			gap: 8px;
			padding-top: 12px;
		}

		.logo-link {
			width: 40px;
			height: 40px;
			border-radius: 999px;
			border: 1px solid rgba(12, 25, 44, 0.06);
			background: linear-gradient(180deg, rgba(14, 209, 170, 0.08), rgba(255, 255, 255, 0.96));
			display: inline-flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 6px 16px rgba(20, 39, 68, 0.07);
			transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
		}

		.logo-link:hover,
		.logo-link:focus-visible {
			transform: translateY(-1px);
			box-shadow: 0 10px 18px rgba(20, 39, 68, 0.12);
			border-color: rgba(14, 209, 170, 0.44);
			outline: none;
		}

		.logo-link img {
			width: 20px;
			height: 20px;
			object-fit: contain;
			display: block;
		}

		.empty {
			padding: 28px;
			border: 1px dashed rgba(12, 25, 44, 0.12);
			border-radius: 12px;
			text-align: center;
			color: var(--muted);
			background: rgba(255, 255, 255, 0.72);
		}

		.version {
			margin-top: 18px;
			text-align: center;
			font-size: 0.76rem;
			color: var(--muted);
		}

		@media (min-width: 860px) {
			.grid {
				grid-template-columns: 1fr 1fr;
			}
		}

		@media (max-width: 639px) {
			.heading {
				align-items: start;
				flex-direction: column;
			}

			.header-actions {
				width: 100%;
				justify-content: space-between;
			}

			.card {
				grid-template-columns: 104px minmax(0, 1fr);
				border-radius: 10px;
				padding: 10px;
				gap: 10px;
			}

			.poster {
				min-height: 212px;
			}

			.scoreboard {
				gap: 8px;
			}

			.synopsis {
				-webkit-line-clamp: 5;
			}

			.score-block {
				padding: 9px 10px;
				min-height: 62px;
			}

			.links {
				padding-top: 10px;
			}
		}
	</style>
</head>
<body>
	<header class="topbar">
		<div class="topbar-inner">
			<div class="heading">
				<div class="header-main">
					<h1>Movie Night</h1>
					<p>Search by title, genre, year, runtime, or synopsis.</p>
					<div class="header-summary" id="header-summary">Search by title, 0 movies</div>
				</div>
				<div class="header-actions">
					<p class="status" id="status">Loading movies…</p>
					<button class="header-toggle" id="header-toggle" type="button" aria-expanded="true">Collapse</button>
				</div>
			</div>
			<div class="topbar-panel" id="topbar-panel">
				<div class="search-wrap">
					<input id="q" class="search" type="search" placeholder="Search movies, genre, year…" autocomplete="off" />
				</div>
				<div class="filters">
					<div class="filter-row" id="year-filters"></div>
					<div class="filter-row" id="genre-filters"></div>
				</div>
			</div>
		</div>
	</header>

	<main class="shell">
		<section id="grid" class="grid" aria-live="polite"></section>
		<div class="version">v0.4.1</div>
	</main>

	<script>
		const CSV_URL_REMOTE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqmDs0N_5ZHMIoXa6IiIrwSysl33ePjsV3hDAYo2tFLLNgyIJKXuH94ZlXbTNfuI4YWAraq01e0-J9/pub?gid=152492302&single=true&output=csv";
		const CSV_URL_LOCAL = "./movies.csv";
		const RT_LOGO = "./images/rt-logo.png";
		const YT_LOGO = "./images/yt-logo.png";
		const KNOWN_GENRES = [
			"Mystery & Thriller",
			"Kids & Family",
			"War & History",
			"Drama Fantasy",
			"Sci-Fi",
			"Action",
			"Adventure",
			"Animation",
			"Biography",
			"Comedy",
			"Crime",
			"Documentary",
			"Drama",
			"Family",
			"Fantasy",
			"History",
			"Horror",
			"Music",
			"Musical",
			"Mystery",
			"Romance",
			"Romcom",
			"Sports",
			"Thriller",
			"TV Movie",
			"War",
			"Western",
			"Whodunnit"
		];

		let data = [];
		let lastRenderedCount = 0;
		const activeFilters = {
			year: "",
			genre: ""
		};

		function parseCSV(text) {
			const rows = [];
			let row = [];
			let cell = "";
			let inQuotes = false;

			for (let i = 0; i < text.length; i += 1) {
				const c = text[i];
				const n = text[i + 1];

				if (c === '"' && inQuotes && n === '"') {
					cell += '"';
					i += 1;
					continue;
				}

				if (c === '"') {
					inQuotes = !inQuotes;
					continue;
				}

				if (c === "," && !inQuotes) {
					row.push(cell);
					cell = "";
					continue;
				}

				if ((c === "\n" || c === "\r") && !inQuotes) {
					if (cell.length || row.length) {
						row.push(cell);
					}
					if (row.length) {
						rows.push(row);
					}
					row = [];
					cell = "";
					if (c === "\r" && n === "\n") {
						i += 1;
					}
					continue;
				}

				cell += c;
			}

			if (cell.length || row.length) {
				row.push(cell);
				rows.push(row);
			}

			return rows;
		}

		function escapeHtml(value) {
			return String(value || "")
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#39;");
		}

		function normalizeHeader(value) {
			return String(value || "").trim().toLowerCase();
		}

		function buildRowObject(headers, row) {
			function pick(...names) {
				for (const name of names) {
					const index = headers.indexOf(normalizeHeader(name));
					if (index !== -1 && row[index]) {
						return String(row[index]).trim();
					}
				}
				return "";
			}

			function pickIndex(index) {
				return row[index] ? String(row[index]).trim() : "";
			}

			return {
				title: pick("title", "movie") || pickIndex(0),
				rotten: pick("rotten tomatoes url", "rotten url", "rotten", "rt url") || pickIndex(1),
				trailer: pick("trailer url", "trailer") || pickIndex(2),
				runtime: pick("runtime") || pickIndex(3),
				genre: pick("genre") || pickIndex(4),
				year: pick("year") || pickIndex(5),
				critics: pick("critics") || pickIndex(6),
				audience: pick("audience") || pickIndex(7),
				synopsis: pick("synopsis", "description", "short description", "overview") || pickIndex(8),
				poster: pick("poster url", "poster", "poster image", "image") || pickIndex(9)
			};
		}

		function validHttpUrl(value) {
			return /^https?:\/\//i.test(String(value || "").trim());
		}

		function scoreText(value) {
			const text = String(value || "").trim();
			return text || "--";
		}

		function sortMovies(a, b) {
			const yearDiff = Number(b.year || 0) - Number(a.year || 0);
			if (yearDiff !== 0) {
				return yearDiff;
			}
			return a.title.localeCompare(b.title);
		}

		function extractGenreTokens(value) {
			const source = String(value || "").trim();
			if (!source) {
				return [];
			}

			const matches = [];
			for (const genre of KNOWN_GENRES) {
				const pattern = genre
					.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
					.replace(/\s*&\s*/g, "\\s*&\\s*")
					.replace(/\s+/g, "\\s+");
				const regex = new RegExp(`(^|[^A-Za-z])(${pattern})(?=$|[^A-Za-z])`, "ig");
				if (regex.test(source)) {
					matches.push(genre);
				}
			}

			if (matches.length) {
				return matches;
			}

			return source
				.split(/[|/,]/)
				.map((part) => part.trim())
				.filter(Boolean);
		}

		function renderFilterRow(elementId, label, options, activeValue, type) {
			const el = document.getElementById(elementId);
			if (!el) {
				return;
			}

			const chips = options.map((option) => {
				const activeClass = option.value === activeValue ? " is-active" : "";
				return `<button class="chip${activeClass}" type="button" data-filter-type="${type}" data-filter-value="${escapeHtml(option.value)}">${escapeHtml(option.label)}</button>`;
			}).join("");

			el.innerHTML = `<span class="filter-label">${label}</span>${chips}`;
		}

		function renderFilters() {
			const years = [...new Set(data.map((movie) => movie.year).filter(Boolean))]
				.sort((a, b) => Number(b) - Number(a))
				.map((year) => ({ label: year, value: year }));

			const genreCounts = new Map();
			for (const movie of data) {
				for (const genre of extractGenreTokens(movie.genre)) {
					genreCounts.set(genre, (genreCounts.get(genre) || 0) + 1);
				}
			}

			const genres = [...genreCounts.entries()]
				.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
				.slice(0, 8)
				.map(([genre]) => ({ label: genre, value: genre }));

			renderFilterRow("year-filters", "Year", [{ label: "All", value: "" }, ...years], activeFilters.year, "year");
			renderFilterRow("genre-filters", "Genre", [{ label: "All", value: "" }, ...genres], activeFilters.genre, "genre");
		}

		function makePoster(movie) {
			if (validHttpUrl(movie.poster)) {
				return `
					<div class="poster">
						<img src="${escapeHtml(movie.poster)}" alt="${escapeHtml(movie.title)} poster" loading="lazy" referrerpolicy="no-referrer" />
					</div>
				`;
			}

			return `
				<div class="poster">
					<div class="poster-fallback">${escapeHtml(movie.title)}</div>
				</div>
			`;
		}

		function makeLinks(movie) {
			const links = [];

			if (validHttpUrl(movie.rotten)) {
				links.push(`
					<a class="logo-link" href="${escapeHtml(movie.rotten)}" target="_blank" rel="noopener" aria-label="Open Rotten Tomatoes page for ${escapeHtml(movie.title)}">
						<img src="${RT_LOGO}" alt="Rotten Tomatoes" />
					</a>
				`);
			}

			if (validHttpUrl(movie.trailer)) {
				links.push(`
					<a class="logo-link" href="${escapeHtml(movie.trailer)}" target="_blank" rel="noopener" aria-label="Open trailer for ${escapeHtml(movie.title)}">
						<img src="${YT_LOGO}" alt="YouTube" />
					</a>
				`);
			}

			return links.join("");
		}

		function makeCard(movie) {
			const el = document.createElement("article");
			el.className = "card";

			const year = movie.year ? `<span class="year">(${escapeHtml(movie.year)})</span>` : "";
			const metaParts = [movie.genre, movie.runtime].filter(Boolean).map(escapeHtml);
			const metaLine = metaParts.length ? `<div class="meta-line">${metaParts.join(" | ")}</div>` : "";
			const synopsis = movie.synopsis ? `<div class="synopsis" role="button" tabindex="0" aria-expanded="false" title="Toggle full synopsis">${escapeHtml(movie.synopsis)}</div>` : "";
			const links = makeLinks(movie);

			el.innerHTML = `
				${makePoster(movie)}
				<div class="content">
					<div class="title-row">
						<h2 class="title">${escapeHtml(movie.title)}</h2>
						${year}
					</div>
					${metaLine}
					${synopsis}
					<div class="scoreboard">
						<div class="score-block">
							<span class="score-label">Critics</span>
							<span class="score-value">${escapeHtml(scoreText(movie.critics))}</span>
						</div>
						<div class="score-block">
							<span class="score-label">Audience</span>
							<span class="score-value">${escapeHtml(scoreText(movie.audience))}</span>
						</div>
					</div>
					<div class="links">${links}</div>
				</div>
			`;

			return el;
		}

		function render(filter = "") {
			const grid = document.getElementById("grid");
			const query = String(filter || "").trim().toLowerCase();
			const filtered = data.filter((movie) => {
				const matchesQuery = !query || [
					movie.title,
					movie.genre,
					movie.year,
					movie.runtime,
					movie.synopsis
				].some((value) => String(value || "").toLowerCase().includes(query));
				const matchesYear = !activeFilters.year || movie.year === activeFilters.year;
				const matchesGenre = !activeFilters.genre || extractGenreTokens(movie.genre).includes(activeFilters.genre);
				return matchesQuery && matchesYear && matchesGenre;
			});

			grid.innerHTML = "";

			if (!filtered.length) {
				grid.innerHTML = `<div class="empty">No movies matched that search.</div>`;
			} else {
				for (const movie of filtered) {
					grid.appendChild(makeCard(movie));
				}
			}

			lastRenderedCount = filtered.length;
			const countText = `${filtered.length} movie${filtered.length === 1 ? "" : "s"}`;
			document.getElementById("status").textContent = countText;
			document.getElementById("header-summary").textContent = `Search by title, ${countText}`;
		}

		function applyHeaderState(expanded) {
			const topbar = document.querySelector(".topbar");
			const toggle = document.getElementById("header-toggle");
			topbar.classList.toggle("is-collapsed", !expanded);
			toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
			toggle.textContent = expanded ? "Collapse" : "Expand";
		}

		async function loadCsvText() {
			try {
				const localResponse = await fetch(CSV_URL_LOCAL, { cache: "no-store" });
				if (localResponse.ok) {
					return await localResponse.text();
				}
			} catch (_error) {
				// Ignore local file failures and fall back to the published sheet.
			}

			const remoteResponse = await fetch(CSV_URL_REMOTE, { cache: "no-store" });
			if (!remoteResponse.ok) {
				throw new Error(`CSV fetch failed with status ${remoteResponse.status}`);
			}
			return await remoteResponse.text();
		}

		async function init() {
			const mobileMedia = window.matchMedia("(max-width: 767px)");
			const text = await loadCsvText();
			const rows = parseCSV(text);
			if (!rows.length) {
				throw new Error("CSV did not contain any rows.");
			}

			const headers = rows[0].map(normalizeHeader);
			data = rows
				.slice(1)
				.filter((row) => row.some((value) => String(value || "").trim()))
				.map((row) => buildRowObject(headers, row))
				.filter((movie) => movie.title)
				.sort(sortMovies);

			renderFilters();
			render();

			document.getElementById("q").addEventListener("input", (event) => {
				render(event.target.value);
			});

			document.getElementById("grid").addEventListener("click", (event) => {
				const synopsis = event.target.closest(".synopsis");
				if (!synopsis) {
					return;
				}

				const expanded = synopsis.classList.toggle("is-expanded");
				synopsis.setAttribute("aria-expanded", expanded ? "true" : "false");
			});

			document.getElementById("grid").addEventListener("keydown", (event) => {
				const synopsis = event.target.closest(".synopsis");
				if (!synopsis) {
					return;
				}

				if (event.key !== "Enter" && event.key !== " ") {
					return;
				}

				event.preventDefault();
				const expanded = synopsis.classList.toggle("is-expanded");
				synopsis.setAttribute("aria-expanded", expanded ? "true" : "false");
			});

			document.querySelector(".filters").addEventListener("click", (event) => {
				const chip = event.target.closest(".chip");
				if (!chip) {
					return;
				}

				const type = chip.getAttribute("data-filter-type");
				const value = chip.getAttribute("data-filter-value") || "";
				activeFilters[type] = value;
				renderFilters();
				render(document.getElementById("q").value);
			});

			const toggle = document.getElementById("header-toggle");
			let headerExpanded = !mobileMedia.matches;
			applyHeaderState(headerExpanded);

			toggle.addEventListener("click", () => {
				headerExpanded = !headerExpanded;
				applyHeaderState(headerExpanded);
			});

			mobileMedia.addEventListener("change", (event) => {
				headerExpanded = !event.matches;
				applyHeaderState(headerExpanded);
			});
		}

		init().catch((error) => {
			console.error(error);
			document.getElementById("status").textContent = "Failed to load movies";
			document.getElementById("grid").innerHTML = `<div class="empty">The movie list could not be loaded.</div>`;
		});
	</script>
</body>
</html>
