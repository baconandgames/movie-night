<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Movie Night</title>
	<link rel="icon" href="./favicon.ico" sizes="any" />
	<link rel="stylesheet" href="./styles.css" />
</head>
<body>
	<header class="topbar">
		<div class="topbar-inner">
			<div class="heading">
				<div class="header-main">
					<h1>Movie Night</h1>
					<p>Search by title, genre, year, runtime, or synopsis.</p>
					<div class="header-summary" id="header-summary">Search by title, 0 movies</div>
				</div>
				<div class="header-actions">
					<p class="status" id="status">Loading movies…</p>
					<button class="header-toggle" id="header-toggle" type="button" aria-expanded="true">Collapse</button>
				</div>
			</div>
			<div class="topbar-panel" id="topbar-panel">
				<div class="search-wrap">
					<input id="q" class="search" type="search" placeholder="Search movies, genre, year…" autocomplete="off" />
				</div>
				<div class="filters">
					<div class="filter-row" id="year-filters"></div>
					<div class="filter-row" id="genre-filters"></div>
				</div>
			</div>
		</div>
	</header>

	<main class="shell">
		<section id="grid" class="grid" aria-live="polite"></section>
		<div class="version">v0.4.2</div>
	</main>

	<script src="./app.js"></script>
</body>
</html>
