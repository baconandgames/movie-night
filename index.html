<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Movie Night</title>
	<style>
		:root {
			--page-bg: #07111f;
			--page-bg-soft: #0d1b31;
			--panel-bg: rgba(10, 24, 44, 0.72);
			--card-bg: rgba(10, 24, 44, 0.86);
			--card-border: rgba(255, 255, 255, 0.08);
			--muted: #8ea0bd;
			--text: #f6fbff;
			--accent: #0ed1aa;
			--accent-soft: rgba(14, 209, 170, 0.14);
			--accent-strong: #13f0c2;
			--shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background:
				radial-gradient(circle at 15% 15%, rgba(14, 209, 170, 0.16), transparent 22%),
				radial-gradient(circle at 85% 10%, rgba(61, 111, 255, 0.14), transparent 26%),
				linear-gradient(180deg, var(--page-bg) 0%, var(--page-bg-soft) 100%);
			color: var(--text);
			font-family: "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
		}

		.shell {
			max-width: 1180px;
			margin: 0 auto;
			padding: 28px 16px 56px;
		}

		.topbar {
			position: sticky;
			top: 0;
			z-index: 10;
			backdrop-filter: blur(18px);
			background: rgba(7, 17, 31, 0.72);
			border-bottom: 1px solid rgba(255, 255, 255, 0.06);
		}

		.topbar-inner {
			max-width: 1100px;
			margin: 0 auto;
			padding: 18px 16px 16px;
		}

		.heading {
			display: flex;
			align-items: end;
			justify-content: space-between;
			gap: 16px;
			margin-bottom: 18px;
		}

		.heading h1 {
			margin: 0;
			font-size: clamp(2.1rem, 4vw, 3.6rem);
			font-weight: 800;
			line-height: 0.9;
			letter-spacing: -0.05em;
		}

		.heading p,
		.status {
			margin: 0;
			color: var(--muted);
			font-size: 0.96rem;
		}

		.search-wrap {
			position: relative;
		}

		.search {
			width: 100%;
			border: 1px solid rgba(255, 255, 255, 0.08);
			border-radius: 22px;
			padding: 18px 20px;
			background: linear-gradient(180deg, rgba(12, 29, 53, 0.96), rgba(9, 22, 39, 0.96));
			color: var(--text);
			font-size: 1rem;
			box-shadow:
				inset 0 1px 0 rgba(255, 255, 255, 0.04),
				0 14px 40px rgba(0, 0, 0, 0.2);
		}

		.search::placeholder {
			color: #7e93b5;
		}

		.search:focus {
			outline: 2px solid rgba(14, 209, 170, 0.16);
			border-color: rgba(14, 209, 170, 0.5);
		}

		.grid {
			display: grid;
			grid-template-columns: 1fr;
			gap: 20px;
			padding-top: 10px;
		}

		.card {
			display: grid;
			grid-template-columns: 122px minmax(0, 1fr);
			gap: 18px;
			padding: 16px;
			border: 1px solid var(--card-border);
			border-radius: 30px;
			background: var(--card-bg);
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
		}

		.card::before {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(135deg, rgba(14, 209, 170, 0.08), transparent 30%, transparent 70%, rgba(61, 111, 255, 0.08));
			pointer-events: none;
		}

		.poster {
			width: 100%;
			aspect-ratio: 2 / 3;
			border-radius: 24px;
			overflow: hidden;
			background: linear-gradient(180deg, rgba(35, 58, 91, 0.8) 0%, rgba(16, 28, 49, 0.96) 100%);
			border: 1px solid rgba(255, 255, 255, 0.06);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
		}

		.poster img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.poster-fallback {
			width: 100%;
			height: 100%;
			display: grid;
			place-items: center;
			padding: 12px;
			text-align: center;
			font-weight: 700;
			font-size: 1rem;
			line-height: 1.1;
			color: rgba(246, 251, 255, 0.72);
		}

		.content {
			min-width: 0;
			display: flex;
			flex-direction: column;
			position: relative;
			z-index: 1;
		}

		.title-row {
			display: flex;
			align-items: baseline;
			gap: 8px;
			flex-wrap: wrap;
		}

		.title {
			margin: 0;
			font-size: clamp(1.35rem, 2.8vw, 1.95rem);
			line-height: 0.98;
			letter-spacing: -0.04em;
		}

		.year {
			font-size: 1.05rem;
			font-weight: 700;
			color: var(--muted);
		}

		.genre,
		.runtime {
			margin-top: 6px;
			color: var(--muted);
			font-size: 0.95rem;
		}

		.scoreboard {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 12px;
			margin-top: 20px;
		}

		.score-block {
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
			border: 1px solid rgba(255, 255, 255, 0.06);
			border-radius: 20px;
			padding: 14px 15px;
			min-height: 92px;
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
		}

		.score-label {
			display: block;
			font-size: 0.78rem;
			font-weight: 800;
			letter-spacing: 0.16em;
			text-transform: uppercase;
			color: var(--accent);
		}

		.score-value {
			display: block;
			margin-top: 6px;
			font-size: clamp(2rem, 6vw, 3.1rem);
			line-height: 1;
			font-weight: 800;
			letter-spacing: -0.05em;
		}

		.synopsis {
			margin-top: 14px;
			color: #dce8fa;
			font-size: 0.95rem;
			line-height: 1.5;
			display: -webkit-box;
			-webkit-line-clamp: 4;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}

		.links {
			margin-top: auto;
			display: flex;
			justify-content: flex-end;
			gap: 10px;
			padding-top: 16px;
		}

		.logo-link {
			width: 48px;
			height: 48px;
			border-radius: 999px;
			border: 1px solid rgba(255, 255, 255, 0.08);
			background: linear-gradient(180deg, rgba(14, 209, 170, 0.14), rgba(255, 255, 255, 0.04));
			display: inline-flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
			transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
		}

		.logo-link:hover,
		.logo-link:focus-visible {
			transform: translateY(-1px);
			box-shadow: 0 14px 28px rgba(0, 0, 0, 0.26);
			border-color: rgba(14, 209, 170, 0.44);
			outline: none;
		}

		.logo-link img {
			width: 24px;
			height: 24px;
			object-fit: contain;
			display: block;
		}

		.empty {
			padding: 28px;
			border: 1px dashed rgba(255, 255, 255, 0.14);
			border-radius: 24px;
			text-align: center;
			color: var(--muted);
			background: rgba(10, 24, 44, 0.56);
		}

		@media (min-width: 860px) {
			.grid {
				grid-template-columns: 1fr 1fr;
			}
		}

		@media (max-width: 639px) {
			.heading {
				align-items: start;
				flex-direction: column;
			}

			.card {
				grid-template-columns: 96px minmax(0, 1fr);
				border-radius: 24px;
				padding: 12px;
				gap: 12px;
			}

			.scoreboard {
				gap: 8px;
			}

			.score-block {
				padding: 10px 12px;
				min-height: 84px;
			}

			.links {
				padding-top: 12px;
			}
		}
	</style>
</head>
<body>
	<header class="topbar">
		<div class="topbar-inner">
			<div class="heading">
				<div>
					<h1>Movie Night</h1>
					<p>Search by title, genre, year, runtime, or synopsis.</p>
				</div>
				<p class="status" id="status">Loading movies…</p>
			</div>
			<div class="search-wrap">
				<input id="q" class="search" type="search" placeholder="Search movies, genre, year…" autocomplete="off" />
			</div>
		</div>
	</header>

	<main class="shell">
		<section id="grid" class="grid" aria-live="polite"></section>
	</main>

	<script>
		const CSV_URL_REMOTE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqmDs0N_5ZHMIoXa6IiIrwSysl33ePjsV3hDAYo2tFLLNgyIJKXuH94ZlXbTNfuI4YWAraq01e0-J9/pub?gid=152492302&single=true&output=csv";
		const CSV_URL_LOCAL = "./movies.csv";
		const RT_LOGO = "./images/rt-logo.png";
		const YT_LOGO = "./images/yt-logo.png";

		let data = [];

		function parseCSV(text) {
			const rows = [];
			let row = [];
			let cell = "";
			let inQuotes = false;

			for (let i = 0; i < text.length; i += 1) {
				const c = text[i];
				const n = text[i + 1];

				if (c === '"' && inQuotes && n === '"') {
					cell += '"';
					i += 1;
					continue;
				}

				if (c === '"') {
					inQuotes = !inQuotes;
					continue;
				}

				if (c === "," && !inQuotes) {
					row.push(cell);
					cell = "";
					continue;
				}

				if ((c === "\n" || c === "\r") && !inQuotes) {
					if (cell.length || row.length) {
						row.push(cell);
					}
					if (row.length) {
						rows.push(row);
					}
					row = [];
					cell = "";
					if (c === "\r" && n === "\n") {
						i += 1;
					}
					continue;
				}

				cell += c;
			}

			if (cell.length || row.length) {
				row.push(cell);
				rows.push(row);
			}

			return rows;
		}

		function escapeHtml(value) {
			return String(value || "")
				.replaceAll("&", "&amp;")
				.replaceAll("<", "&lt;")
				.replaceAll(">", "&gt;")
				.replaceAll('"', "&quot;")
				.replaceAll("'", "&#39;");
		}

		function normalizeHeader(value) {
			return String(value || "").trim().toLowerCase();
		}

		function buildRowObject(headers, row) {
			function pick(...names) {
				for (const name of names) {
					const index = headers.indexOf(normalizeHeader(name));
					if (index !== -1 && row[index]) {
						return String(row[index]).trim();
					}
				}
				return "";
			}

			return {
				title: pick("title", "movie"),
				rotten: pick("rotten tomatoes url", "rotten url", "rotten", "rt url"),
				trailer: pick("trailer url", "trailer"),
				runtime: pick("runtime"),
				genre: pick("genre"),
				year: pick("year"),
				critics: pick("critics"),
				audience: pick("audience"),
				synopsis: pick("synopsis", "description"),
				poster: pick("poster url", "poster")
			};
		}

		function validHttpUrl(value) {
			return /^https?:\/\//i.test(String(value || "").trim());
		}

		function scoreText(value) {
			const text = String(value || "").trim();
			return text || "--";
		}

		function sortMovies(a, b) {
			const yearDiff = Number(b.year || 0) - Number(a.year || 0);
			if (yearDiff !== 0) {
				return yearDiff;
			}
			return a.title.localeCompare(b.title);
		}

		function makePoster(movie) {
			if (validHttpUrl(movie.poster)) {
				return `
					<div class="poster">
						<img src="${escapeHtml(movie.poster)}" alt="${escapeHtml(movie.title)} poster" loading="lazy" referrerpolicy="no-referrer" />
					</div>
				`;
			}

			return `
				<div class="poster">
					<div class="poster-fallback">${escapeHtml(movie.title)}</div>
				</div>
			`;
		}

		function makeLinks(movie) {
			const links = [];

			if (validHttpUrl(movie.rotten)) {
				links.push(`
					<a class="logo-link" href="${escapeHtml(movie.rotten)}" target="_blank" rel="noopener" aria-label="Open Rotten Tomatoes page for ${escapeHtml(movie.title)}">
						<img src="${RT_LOGO}" alt="Rotten Tomatoes" />
					</a>
				`);
			}

			if (validHttpUrl(movie.trailer)) {
				links.push(`
					<a class="logo-link" href="${escapeHtml(movie.trailer)}" target="_blank" rel="noopener" aria-label="Open trailer for ${escapeHtml(movie.title)}">
						<img src="${YT_LOGO}" alt="YouTube" />
					</a>
				`);
			}

			return links.join("");
		}

		function makeCard(movie) {
			const el = document.createElement("article");
			el.className = "card";

			const year = movie.year ? `<span class="year">(${escapeHtml(movie.year)})</span>` : "";
			const runtime = movie.runtime ? `<div class="runtime">${escapeHtml(movie.runtime)}</div>` : "";
			const genre = movie.genre ? `<div class="genre">${escapeHtml(movie.genre)}</div>` : "";
			const synopsis = movie.synopsis ? `<div class="synopsis">${escapeHtml(movie.synopsis)}</div>` : "";
			const links = makeLinks(movie);

			el.innerHTML = `
				${makePoster(movie)}
				<div class="content">
					<div class="title-row">
						<h2 class="title">${escapeHtml(movie.title)}</h2>
						${year}
					</div>
					${genre}
					${runtime}
					<div class="scoreboard">
						<div class="score-block">
							<span class="score-label">Critics</span>
							<span class="score-value">${escapeHtml(scoreText(movie.critics))}</span>
						</div>
						<div class="score-block">
							<span class="score-label">Audience</span>
							<span class="score-value">${escapeHtml(scoreText(movie.audience))}</span>
						</div>
					</div>
					${synopsis}
					<div class="links">${links}</div>
				</div>
			`;

			return el;
		}

		function render(filter = "") {
			const grid = document.getElementById("grid");
			const query = String(filter || "").trim().toLowerCase();
			const filtered = query
				? data.filter((movie) =>
					[
						movie.title,
						movie.genre,
						movie.year,
						movie.runtime,
						movie.synopsis
					].some((value) => String(value || "").toLowerCase().includes(query))
				)
				: data;

			grid.innerHTML = "";

			if (!filtered.length) {
				grid.innerHTML = `<div class="empty">No movies matched that search.</div>`;
			} else {
				for (const movie of filtered) {
					grid.appendChild(makeCard(movie));
				}
			}

			document.getElementById("status").textContent = `${filtered.length} movie${filtered.length === 1 ? "" : "s"}`;
		}

		async function loadCsvText() {
			try {
				const localResponse = await fetch(CSV_URL_LOCAL, { cache: "no-store" });
				if (localResponse.ok) {
					return await localResponse.text();
				}
			} catch (_error) {
				// Ignore local file failures and fall back to the published sheet.
			}

			const remoteResponse = await fetch(CSV_URL_REMOTE, { cache: "no-store" });
			if (!remoteResponse.ok) {
				throw new Error(`CSV fetch failed with status ${remoteResponse.status}`);
			}
			return await remoteResponse.text();
		}

		async function init() {
			const text = await loadCsvText();
			const rows = parseCSV(text);
			if (!rows.length) {
				throw new Error("CSV did not contain any rows.");
			}

			const headers = rows[0].map(normalizeHeader);
			data = rows
				.slice(1)
				.filter((row) => row.some((value) => String(value || "").trim()))
				.map((row) => buildRowObject(headers, row))
				.filter((movie) => movie.title)
				.sort(sortMovies);

			render();

			document.getElementById("q").addEventListener("input", (event) => {
				render(event.target.value);
			});
		}

		init().catch((error) => {
			console.error(error);
			document.getElementById("status").textContent = "Failed to load movies";
			document.getElementById("grid").innerHTML = `<div class="empty">The movie list could not be loaded.</div>`;
		});
	</script>
</body>
</html>
